services:
  - type: web
    name: whatsa-king
    env: static
    staticPublishPath: ./docs
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: whatsapp-bots-api
    env: node
    buildCommand: cd telegram-bot && npm install
    startCommand: cd telegram-bot && node index.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
